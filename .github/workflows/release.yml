name: Release to PyPI

# Triggered by pushing a tag in the form vX.Y.Z. The tag MUST match the
# version declared in pyproject.toml — the build will succeed regardless,
# but the install side will be confused if they diverge.
#
# Uses PyPI Trusted Publishing (OIDC). No API token, no secret. PyPI side
# must have a publisher entry registered for:
#   project   = siglume-agent-core
#   owner     = taihei-05
#   repo      = siglume-agent-core
#   workflow  = release.yml
#   environment = pypi
# Set this up once at https://pypi.org/manage/account/publishing/

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade build

      # Belt-and-suspenders against mistags: a `vX.Y.Z` tag MUST match
      # the `project.version` declared in pyproject.toml. Without this
      # guard a mistag (e.g. pushing v0.3.0 while pyproject.toml is
      # still 0.2.5) would silently publish 0.2.5 under the wrong
      # release notes, or — if the version was already on PyPI —
      # fail the publish step late with a confusing 400. Codex review
      # on PR #1 flagged the gap; we got lucky for v0.1.0 → v0.2.5
      # because every tag was hand-pushed alongside the same-PR
      # version bump, but that's not load-bearing.
      - name: Verify tag matches pyproject.toml version
        run: |
          set -euo pipefail
          tag_ref="${GITHUB_REF#refs/tags/}"
          tag_version="${tag_ref#v}"
          pkg_version=$(python -c 'import tomllib, sys; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "Tag version:  $tag_version"
          echo "pyproject:    $pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $tag_ref does not match pyproject.toml version $pkg_version"
            echo "Either retag (delete the wrong tag with 'git push origin :refs/tags/$tag_ref' and push the correct one),"
            echo "or open a PR bumping pyproject.toml to $tag_version before re-pushing this tag."
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Inspect sdist contents
        run: |
          ls -lah dist/
          echo "--- sdist manifest ---"
          tar -tzf dist/*.tar.gz | head -30

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The 'pypi' environment matches the PyPI Trusted Publisher config.
    environment: pypi
    permissions:
      # Required for OIDC token issuance — gh-action-pypi-publish reads this
      # to attest to PyPI that the workflow is the registered publisher.
      id-token: write
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` / `user:` — OIDC handles auth.
