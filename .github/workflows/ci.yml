name: CI

# Triggered on every PR and on push to main. Catches the class of bugs
# the v0.2 review surfaced (broken README example, top-level imports of
# optional extras) before a release goes out.
#
# Two install matrices:
#   - core-only (no extras): exercises the v0.2.1 lazy-import contract;
#     `import siglume_agent_core.provider_adapters.anthropic_tools` MUST
#     succeed even with `anthropic` absent.
#   - all-extras: full smoke + adapter behaviour tests.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Two real matrix dimensions = 2x2 = 4 jobs. The earlier shape
      # used `matrix.include` for extras, which (per Actions semantics)
      # merged both extras entries into the SAME python-version
      # combinations and let the second overwrite the first — so
      # core-only was never actually exercised. The lazy-import
      # contract in v0.2.1 needs an extras-less install to bite, so
      # extras MUST be a separate dimension. Codex review on PR #4
      # caught the regression risk before any CI run reproduced it.
      matrix:
        python-version: ["3.11", "3.12"]
        extras:
          - "core-only"
          - "all-extras"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build / runtime deps
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.extras }}" = "core-only" ]; then
            pip install -e ".[dev]"
          else
            pip install -e ".[dev,anthropic,openai]"
          fi

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: pytest
        run: pytest -q

  build:
    name: python -m build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: List artifacts
        run: ls -lah dist/
